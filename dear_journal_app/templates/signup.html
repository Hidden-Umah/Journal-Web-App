<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | DearJournal</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/signup.css' %}">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="nav">
                <div class="logo">
                    <a href="{% url 'landing' %}">
                        <img src="{% static 'images/logo.png' %}" alt="DearJournal Logo">
                    </a>
                </div>
                <div class="auth-buttons">
                    <a href="{% url 'signin' %}">
                        <button class="btn-signin">Sign In</button>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Signup Form -->
    <div class="signup-container">
        <h2>Create Your Account</h2>

        <!-- Show messages -->
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="alert {% if message.tags %} alert-{{ message.tags }} {% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
        {% endif %}

        <form action="{% url 'signup' %}" method="POST" novalidate>
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Choose a username" 
                    required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Enter your email" 
                    required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Create a password" 
                    required 
                    minlength="6">
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input 
                    type="password" 
                    id="confirm_password" 
                    name="confirm_password" 
                    placeholder="Re-enter your password" 
                    required 
                    minlength="6">
            </div>

            <button type="submit" class="btn">Sign Up</button>
        </form>

        <div class="signin-link">
            Already have an account? 
            <a href="{% url 'signin' %}">Sign In here</a>
        </div>
    </div>

    <!-- Password Match Validation -->
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            const pwd = document.getElementById('password').value.trim();
            const cpwd = document.getElementById('confirm_password').value.trim();
            
            if (pwd !== cpwd) {
                e.preventDefault();
                alert('Passwords do not match!');
            }
        });
    </script>
</body>
</html>
