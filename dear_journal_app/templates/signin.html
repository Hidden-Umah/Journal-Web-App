<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Sign In | DearJournal</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/signin.css' %}">
    <link rel="stylesheet" href="{% static 'css/signup.css' %}">
</head>
<body>
    <!-- Popup messages -->
    <div id="popup-messages">
        {% if messages %}
            {% for message in messages %}
                <div class="popup {{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="nav">
                <div class="logo">
                    <a href="{% url 'landing' %}">
                        <img src="{% static 'images/logo.png' %}" alt="DearJournal Logo">
                    </a>
                </div>
                <div class="auth-buttons">
                    <a href="{% url 'signup' %}">
                        <button class="btn-signin">Sign up</button>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Signin form -->
    <div class="signin-container">
        <h2>Client Sign In</h2>
        <form method="post" action="{% url 'client_login' %}">
            {% csrf_token %}
            
            <div class="form-group"> 
                <label for="username">Username</label>
                <input type="text" name="username" id="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group"> 
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Enter your password" required>
            </div>

            <div>
                <button type="submit" class="signin-btn">Sign In</button>
            </div>
        </form>

        <div class="extra">
            Don’t have an account? 
            <a href="{% url 'signup' %}">Sign Up here</a>
        </div>
    </div>

    <!-- Auto-hide messages -->
    <script>
      setTimeout(() => {
          document.querySelectorAll('.popup').forEach(el => {
              el.style.opacity = '0';
              el.style.transition = 'opacity 0.5s ease';
              setTimeout(() => el.remove(), 500);
          });
      }, 3000);
    </script>
</body>
</html>
